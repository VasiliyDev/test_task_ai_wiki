server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # API проксируем на сервис api (имя из docker-compose).
  location /api/ {
    proxy_pass http://api:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    # SSE-стрим «хода мысли»: без буферизации, HTTP/1.1 keep-alive, длинный таймаут.
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 300s;
  }

  # SPA: всё остальное отдаём index.html (history-режим роутера).
  location / {
    try_files $uri $uri/ /index.html;
  }
}
